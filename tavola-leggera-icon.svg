<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#18120a"/>
  <!-- piatto -->
  <ellipse cx="256" cy="280" rx="150" ry="18" fill="#2e2016"/>
  <ellipse cx="256" cy="265" rx="150" ry="18" fill="#3a2a1a"/>
  <!-- foglia sinistra -->
  <ellipse cx="180" cy="200" rx="48" ry="22" fill="#6db87a" transform="rotate(-30 180 200)"/>
  <line x1="180" y1="200" x2="195" y2="248" stroke="#4a8a55" stroke-width="3" stroke-linecap="round"/>
  <!-- foglia destra -->
  <ellipse cx="332" cy="195" rx="48" ry="22" fill="#6db87a" transform="rotate(30 332 195)"/>
  <line x1="332" y1="195" x2="317" y2="248" stroke="#4a8a55" stroke-width="3" stroke-linecap="round"/>
  <!-- cibo centrale -->
  <ellipse cx="256" cy="248" rx="80" ry="52" fill="#C8813A"/>
  <ellipse cx="256" cy="242" rx="70" ry="44" fill="#e09a55"/>
  <!-- fork -->
  <rect x="148" y="140" width="8" height="100" rx="4" fill="#C8813A"/>
  <rect x="144" y="138" width="4" height="30" rx="2" fill="#C8813A"/>
  <rect x="152" y="138" width="4" height="30" rx="2" fill="#C8813A"/>
  <rect x="160" y="138" width="4" height="30" rx="2" fill="#C8813A"/>
  <!-- knife -->
  <rect x="356" y="138" width="8" height="100" rx="4" fill="#C8813A"/>
  <path d="M356 138 Q372 160 364 175 L356 175Z" fill="#C8813A"/>
  <!-- TL monogram -->
  <text x="256" y="258" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="800" fill="#18120a" letter-spacing="-1">TL</text>
  <!-- tagline arc -->
  <path id="arc" d="M 126 310 A 130 130 0 0 0 386 310" fill="none"/>
  <text font-family="Helvetica Neue, Arial, sans-serif" font-size="22" font-weight="600" fill="#C8813A" letter-spacing="2">
    <textPath href="#arc" startOffset="50%" text-anchor="middle">TAVOLALEGGERA</textPath>
  </text>
</svg>
